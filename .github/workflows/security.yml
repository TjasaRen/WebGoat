name: Security Pipeline

on:
  push:
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (WebGoat je Java)
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25

      # 3. Build project
      - name: Build with Maven
        run: mvn clean install -DskipTests

      # 4. Install Syft
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh
          sudo mv ./bin/syft /usr/local/bin/syft

      # 5. Generate SBOM
      - name: Generate SBOM
        run: syft . -o json > sbom.json

      # 6. Install Grype
      - name: Install Grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh
          sudo mv grype /usr/local/bin/

      # 7. Run vulnerability scan
      - name: Run Grype scan
        run: grype sbom:sbom.json -o json > grype.json

      # 8. Install Semgrep
      - name: Install Semgrep
        run: pip install semgrep

      # 9. Run SAST
      - name: Run Semgrep scan
        run: semgrep --config=auto . --json > sast.json

      # 10. Security gate (basic fail rule)
      - name: Check Critical vulnerabilities
        run: |
          CRITICAL=$(jq '[.matches[] | select(.vulnerability.severity=="Critical")] | length' grype.json)
          echo "Critical vulnerabilities: $CRITICAL"
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Security gate failed!"
            exit 1
          fi